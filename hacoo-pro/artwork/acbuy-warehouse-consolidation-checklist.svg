<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">ACbuy warehouse-to-parcel checklist</title>
  <desc id="desc">An original four-stage editorial diagram covering QC review, storage timing, consolidation choice and parcel submission.</desc>
  <rect width="1200" height="630" fill="#171715"/>
  <circle cx="1060" cy="-20" r="250" fill="#ddff68" opacity="0.12"/>
  <circle cx="40" cy="650" r="260" fill="#ff603d" opacity="0.11"/>
  <text x="72" y="82" fill="#ddff68" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" letter-spacing="3">HACOO PRO / FIELD RESEARCH</text>
  <text x="72" y="140" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="800">Before you submit an ACbuy parcel</text>
  <text x="72" y="181" fill="#aaa99f" font-family="Arial, Helvetica, sans-serif" font-size="20">Four decisions between warehouse arrival and international dispatch</text>

  <g transform="translate(72 246)">
    <rect width="246" height="250" rx="28" fill="#f6f4ee"/>
    <circle cx="42" cy="43" r="22" fill="#ff603d"/>
    <text x="42" y="50" text-anchor="middle" fill="#fff" font-family="Arial" font-size="16" font-weight="700">01</text>
    <text x="26" y="102" fill="#171715" font-family="Arial" font-size="26" font-weight="800">Review QC</text>
    <text x="26" y="137" fill="#686860" font-family="Arial" font-size="16">Match option, quantity</text>
    <text x="26" y="163" fill="#686860" font-family="Arial" font-size="16">and useful evidence.</text>
    <rect x="26" y="197" width="194" height="1" fill="#d8d5cc"/>
    <text x="26" y="226" fill="#171715" font-family="Arial" font-size="13" font-weight="700">Do not rely on the thumbnail.</text>
  </g>

  <g transform="translate(340 246)">
    <rect width="246" height="250" rx="28" fill="#f6f4ee"/>
    <circle cx="42" cy="43" r="22" fill="#ff603d"/>
    <text x="42" y="50" text-anchor="middle" fill="#fff" font-family="Arial" font-size="16" font-weight="700">02</text>
    <text x="26" y="102" fill="#171715" font-family="Arial" font-size="26" font-weight="800">Track storage</text>
    <text x="26" y="137" fill="#686860" font-family="Arial" font-size="16">Record the live deadline</text>
    <text x="26" y="163" fill="#686860" font-family="Arial" font-size="16">shown for every order.</text>
    <rect x="26" y="197" width="194" height="1" fill="#d8d5cc"/>
    <text x="26" y="226" fill="#171715" font-family="Arial" font-size="13" font-weight="700">Plan from the earliest date.</text>
  </g>

  <g transform="translate(608 246)">
    <rect width="246" height="250" rx="28" fill="#f6f4ee"/>
    <circle cx="42" cy="43" r="22" fill="#ff603d"/>
    <text x="42" y="50" text-anchor="middle" fill="#fff" font-family="Arial" font-size="16" font-weight="700">03</text>
    <text x="26" y="102" fill="#171715" font-family="Arial" font-size="26" font-weight="800">Group wisely</text>
    <text x="26" y="137" fill="#686860" font-family="Arial" font-size="16">Compare one sensible</text>
    <text x="26" y="163" fill="#686860" font-family="Arial" font-size="16">combined plan and a split.</text>
    <rect x="26" y="197" width="194" height="1" fill="#d8d5cc"/>
    <text x="26" y="226" fill="#171715" font-family="Arial" font-size="13" font-weight="700">Check route compatibility.</text>
  </g>

  <g transform="translate(876 246)">
    <rect width="246" height="250" rx="28" fill="#ddff68"/>
    <circle cx="42" cy="43" r="22" fill="#171715"/>
    <text x="42" y="50" text-anchor="middle" fill="#ddff68" font-family="Arial" font-size="16" font-weight="700">04</text>
    <text x="26" y="102" fill="#171715" font-family="Arial" font-size="26" font-weight="800">Submit parcel</text>
    <text x="26" y="137" fill="#31312d" font-family="Arial" font-size="16">Save the line, services,</text>
    <text x="26" y="163" fill="#31312d" font-family="Arial" font-size="16">estimate and live terms.</text>
    <rect x="26" y="197" width="194" height="1" fill="#171715" opacity="0.25"/>
    <text x="26" y="226" fill="#171715" font-family="Arial" font-size="13" font-weight="700">Final cost follows packing.</text>
  </g>

  <path d="M318 371h22M586 371h22M854 371h22" stroke="#ddff68" stroke-width="4" stroke-linecap="round"/>
  <text x="72" y="570" fill="#aaa99f" font-family="Arial, Helvetica, sans-serif" font-size="16">Original Hacoo Pro editorial graphic · Facts checked 19 July 2026</text>
</svg>
