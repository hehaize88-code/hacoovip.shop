<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Hacoo affiliate review flow</title>
  <desc id="desc">An editorial diagram showing discovery, evidence-based review, tracking link, and the checks a reader should complete before acting.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f7ff"/>
      <stop offset="1" stop-color="#eae7ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3157ff"/>
      <stop offset="1" stop-color="#6947df"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#152044" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="630" rx="36" fill="url(#bg)"/>
  <circle cx="1080" cy="70" r="180" fill="#dcd6ff" opacity="0.55"/>
  <circle cx="120" cy="600" r="190" fill="#e5eaff" opacity="0.8"/>
  <text x="70" y="86" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800" fill="#111a38">How an affiliate review reaches a reader</text>
  <text x="70" y="126" font-family="Inter, Arial, sans-serif" font-size="20" fill="#5d6680">Official program flow, followed by an independent evidence check</text>

  <g filter="url(#shadow)">
    <rect x="70" y="180" width="290" height="190" rx="24" fill="#ffffff" stroke="#d8dced"/>
    <rect x="455" y="180" width="290" height="190" rx="24" fill="#ffffff" stroke="#d8dced"/>
    <rect x="840" y="180" width="290" height="190" rx="24" fill="#ffffff" stroke="#d8dced"/>
  </g>
  <circle cx="120" cy="230" r="24" fill="#eef0ff"/>
  <circle cx="505" cy="230" r="24" fill="#eef0ff"/>
  <circle cx="890" cy="230" r="24" fill="#eef0ff"/>
  <text x="120" y="238" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#3157ff">1</text>
  <text x="505" y="238" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#3157ff">2</text>
  <text x="890" y="238" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#3157ff">3</text>
  <text x="105" y="285" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="#111a38">Discover a niche</text>
  <text x="105" y="322" font-family="Inter, Arial, sans-serif" font-size="18" fill="#5d6680">Select finds relevant to</text>
  <text x="105" y="348" font-family="Inter, Arial, sans-serif" font-size="18" fill="#5d6680">the creator's audience.</text>
  <text x="490" y="285" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="#111a38">Review with evidence</text>
  <text x="490" y="322" font-family="Inter, Arial, sans-serif" font-size="18" fill="#5d6680">Explain pros, cons and</text>
  <text x="490" y="348" font-family="Inter, Arial, sans-serif" font-size="18" fill="#5d6680">use a tracking link.</text>
  <text x="875" y="285" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="#111a38">Measure response</text>
  <text x="875" y="322" font-family="Inter, Arial, sans-serif" font-size="18" fill="#5d6680">Clicks and conversions can</text>
  <text x="875" y="348" font-family="Inter, Arial, sans-serif" font-size="18" fill="#5d6680">inform creator performance.</text>

  <path d="M375 275h55" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  <path d="M422 258l18 17-18 17" fill="none" stroke="#604ae0" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M760 275h55" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  <path d="M807 258l18 17-18 17" fill="none" stroke="#604ae0" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="70" y="430" width="1060" height="135" rx="24" fill="#111a38"/>
  <text x="105" y="478" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800" fill="#dfff45">Reader checkpoint</text>
  <text x="105" y="522" font-family="Inter, Arial, sans-serif" font-size="20" fill="#ffffff">Disclosure</text>
  <text x="300" y="522" font-family="Inter, Arial, sans-serif" font-size="20" fill="#ffffff">Specific evidence</text>
  <text x="555" y="522" font-family="Inter, Arial, sans-serif" font-size="20" fill="#ffffff">Correct destination</text>
  <text x="835" y="522" font-family="Inter, Arial, sans-serif" font-size="20" fill="#ffffff">Current checkout terms</text>
  <circle cx="87" cy="515" r="5" fill="#dfff45"/>
  <circle cx="282" cy="515" r="5" fill="#dfff45"/>
  <circle cx="537" cy="515" r="5" fill="#dfff45"/>
  <circle cx="817" cy="515" r="5" fill="#dfff45"/>
  <text x="70" y="605" font-family="Inter, Arial, sans-serif" font-size="15" fill="#6c7390">Original editorial diagram based on Hacoo's public Affiliate &amp; Creator Program page · hacoo.store</text>
</svg>
