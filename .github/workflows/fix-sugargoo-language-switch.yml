name: Fix Sugargoo language consistency

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fix-sugargoo-language-switch.yml'

permissions:
  contents: write

jobs:
  fix-language:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add language helper to all pages and worker output
        shell: python
        run: |
          from pathlib import Path

          root = Path('sugargoovip-preview')
          for path in root.rglob('*.html'):
              text = path.read_text(encoding='utf-8')
              if 'language-fix.js' in text:
                  continue
              rel = path.relative_to(root)
              depth = max(0, len(rel.parent.parts))
              src = '../' * depth + 'assets/language-fix.js'
              text = text.replace('</body>', f'<script src="{src}" defer></script>\n</body>')
              path.write_text(text, encoding='utf-8')

          worker = root / '_worker.js'
          text = worker.read_text(encoding='utf-8')
          text = text.replace(
              '<script src="/assets/i18n.js" defer></script></body></html>',
              '<script src="/assets/i18n.js" defer></script><script src="/assets/language-fix.js" defer></script></body></html>'
          )
          text = text.replace(
              '`<script>localStorage.setItem(\'sugargooLang\',\'${lang}\')</script><script src="/assets/i18n.js" defer></script>`',
              '`<script>localStorage.setItem(\'sugargooLang\',\'${lang}\')</script><script src="/assets/i18n.js" defer></script><script src="/assets/language-fix.js" defer></script>`'
          )
          text = text.replace(
              'if (path === "/guides/" || path === "/guides/index.html") html = guideHub();',
              'if (path === "/guides/" || path === "/guides/index.html") html = null;'
          )
          worker.write_text(text, encoding='utf-8')

      - name: Commit language fixes
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/fix-sugargoo-language-switch.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No language fixes were needed.'
            exit 0
          fi
          git commit -m 'Fix Sugargoo guide language filtering and switching'
          git push origin HEAD:main
