name: Fix Sugargoo language switching

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fix-sugargoo-language-switch.yml'

permissions:
  contents: write

jobs:
  fix-language-switch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Repair language selection logic
        shell: python
        run: |
          from pathlib import Path

          path = Path('sugargoovip-preview/assets/i18n.js')
          text = path.read_text(encoding='utf-8')
          old = "function chooseLanguage(lang){const p=seoBasePath();if((lang==='en'||SEO_LANGS.includes(lang))&&SEO_CORE.has(p)){const target=lang==='en'?p:'/'+lang+(p==='/'?'/':p);location.href=target+location.search+location.hash;return}localStorage.setItem('sugargooLang',lang);apply(lang)}"
          new = "function chooseLanguage(lang){localStorage.setItem('sugargooLang',lang);const p=seoBasePath();if((lang==='en'||SEO_LANGS.includes(lang))&&SEO_CORE.has(p)){const target=lang==='en'?p:'/'+lang+(p==='/'?'/':p);let current=location.pathname;if(current==='/index.html')current='/';if(current==='/guides/index.html')current='/guides/';if(current!==target){location.assign(target+location.search+location.hash);return}}apply(lang);window.dispatchEvent(new CustomEvent('sugargoo:languagechange',{detail:{lang}}))}"
          if old not in text:
              raise SystemExit('Current chooseLanguage implementation was not found')
          path.write_text(text.replace(old, new), encoding='utf-8')

      - name: Commit repair
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/fix-sugargoo-language-switch.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix Sugargoo language selector navigation and state'
          git push origin HEAD:main
