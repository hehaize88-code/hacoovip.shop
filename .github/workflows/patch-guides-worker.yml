name: Patch Guides Worker

on:
  push:
    paths:
      - '.github/workflows/patch-guides-worker.yml'

permissions:
  contents: write

jobs:
  patch-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Serve the maintained static Guides index
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('sugargoovip-preview/_worker.js')
          text = path.read_text(encoding='utf-8')
          old = '''    if (path === "/guides/" || path === "/guides/index.html") html = guideHub();
    else if (path === "/categories/" || path === "/categories/index.html") html = categoryHub();'''
          new = '''    if (path === "/guides/" || path === "/guides/index.html") {
      const guideUrl = new URL(request.url);
      guideUrl.pathname = "/guides/index.html";
      return env.ASSETS.fetch(new Request(guideUrl.toString(), request));
    }
    if (path === "/categories/" || path === "/categories/index.html") html = categoryHub();'''
          if old not in text:
              raise SystemExit('Expected Guides route block was not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Commit worker update and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sugargoovip-preview/_worker.js
          git rm .github/workflows/patch-guides-worker.yml
          git commit -m "Serve static Guides index for daily SEO articles"
          git push