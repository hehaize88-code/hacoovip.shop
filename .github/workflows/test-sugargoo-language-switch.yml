name: Test Sugargoo language switching

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/test-sugargoo-language-switch.yml'

permissions:
  contents: write

jobs:
  test-language-switching:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install DOM test dependency
        run: npm install --no-save jsdom@24

      - name: Run language-switch regression tests
        run: |
          cat > .tmp-test-language.mjs <<'JS'
          import fs from 'node:fs';
          import {JSDOM} from 'jsdom';

          const base='sugargoovip-preview';
          const i18n=fs.readFileSync(`${base}/assets/i18n.js`,'utf8');
          const fix=fs.readFileSync(`${base}/assets/language-fix.js`,'utf8');

          function boot(html,url,stored,extra=''){
            const dom=new JSDOM(html,{url,runScripts:'outside-only'});
            if(stored) dom.window.localStorage.setItem('sugargooLang',stored);
            dom.window.eval(i18n);
            dom.window.eval(fix);
            if(extra) dom.window.eval(extra);
            dom.window.document.dispatchEvent(new dom.window.Event('DOMContentLoaded',{bubbles:true}));
            return dom;
          }
          async function change(dom,lang){
            const select=dom.window.document.querySelector('.language-select');
            select.value=lang;
            select.dispatchEvent(new dom.window.Event('change',{bubbles:true}));
            await new Promise(resolve=>dom.window.setTimeout(resolve,10));
          }
          function assert(ok,msg){if(!ok) throw new Error(msg);}

          const homeHtml=fs.readFileSync(`${base}/index.html`,'utf8');
          const home=boot(homeHtml,'https://sugargoovip.uk/','it');
          assert(home.window.document.querySelector('.language-select').value==='it','Home did not start in Italian');
          assert(home.window.document.querySelector('[data-i18n="hero.b"]').textContent.includes('Guida'),'Italian home copy missing');
          await change(home,'en');
          assert(home.window.localStorage.getItem('sugargooLang')==='en','English was not saved');
          assert(home.window.document.querySelector('.language-select').value==='en','Selector reverted from English');
          assert(home.window.document.querySelector('[data-i18n="hero.b"]').textContent==='Shopping Guide','Home did not change to English');
          assert(home.window.location.pathname==='/','English home changed page unexpectedly');
          await change(home,'de');
          assert(home.window.document.querySelector('.language-select').value==='de','Selector did not change to German');
          assert(home.window.location.pathname==='/de/','German SEO URL was not retained in place');
          assert(home.window.document.querySelector('[data-i18n="hero.b"]').textContent.includes('Einkaufsratgeber'),'German home copy missing');
          await change(home,'pt');
          assert(home.window.document.querySelector('.language-select').value==='pt','Selector did not change to Portuguese');
          assert(home.window.location.pathname==='/','Portuguese did not return to the same base page');

          const articlePath='guides/sugargoo-reverse-shopping-multi-item-order-ledger.html';
          const articleHtml=fs.readFileSync(`${base}/${articlePath}`,'utf8');
          const articleScript=fs.readFileSync(`${base}/assets/reverse-articles/multi-item-order-ledger.js`,'utf8');
          const article=boot(articleHtml,`https://sugargoovip.uk/${articlePath}`,'it',articleScript);
          await new Promise(resolve=>article.window.setTimeout(resolve,10));
          assert(article.window.document.querySelector('.article-card h1').textContent.startsWith('Come organizzare'),'Article did not start in Italian');
          await change(article,'en');
          assert(article.window.location.pathname===`/${articlePath}`,'Article language switch jumped away from the article');
          assert(article.window.document.querySelector('.article-card h1').textContent.startsWith('How to Organize'),'Article body did not switch to English');
          await change(article,'zh');
          assert(article.window.location.pathname===`/${articlePath}`,'Chinese switch jumped away from the article');
          assert(article.window.document.querySelector('.article-card h1').textContent.includes('反向代购'),'Article did not restore Chinese');

          console.log('PASS: home and independent article language switching remain on the current page.');
          JS
          node .tmp-test-language.mjs

      - name: Remove test workflow after passing
        run: |
          rm -rf .github/workflows/test-sugargoo-language-switch.yml .tmp-test-language.mjs node_modules package.json package-lock.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Verify Sugargoo language switching on home and article pages'
          git push origin HEAD:main
