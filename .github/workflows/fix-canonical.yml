name: Fix canonical domain

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fix-canonical.yml'

permissions:
  contents: write

jobs:
  migrate-domain:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Replace Pages domain with production domain
        shell: bash
        run: |
          set -euo pipefail
          find sugargoovip-preview -type f \( -name '*.html' -o -name '*.xml' -o -name '*.txt' -o -name '*.json' \) -print0 \
            | xargs -0 sed -i 's#https://sugargoovip-uk\.pages\.dev#https://sugargoovip.uk#g'
          rm -f .github/workflows/fix-canonical.yml

      - name: Commit production canonical URLs
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No canonical URLs needed updating.'
            exit 0
          fi
          git commit -m 'Use sugargoovip.uk as canonical domain across site'
          git push origin HEAD:main
