name: Fix reverse article body languages

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fix-reverse-article-body-languages.yml'

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add full-article locale scripts and preserve current page
        shell: python
        run: |
          from pathlib import Path

          base = Path('sugargoovip-preview')
          scripts = {
              'guides/sugargoo-reverse-shopping-multi-item-order-ledger.html': '/assets/reverse-articles/multi-item-order-ledger.js',
              'guides/sugargoo-reverse-shopping-image-to-product-link.html': '/assets/reverse-articles/image-to-product-link.js',
              'guides/sugargoo-reverse-shopping-confirmation-checkpoints.html': '/assets/reverse-articles/confirmation-checkpoints.js',
              'guides/sugargoo-reverse-shopping-order-boundaries.html': '/assets/reverse-articles/order-boundaries.js',
              'guides/sugargoo-reverse-shopping-product-link-workflow.html': '/assets/reverse-articles/product-link-workflow.js',
          }
          for rel, src in scripts.items():
              path = base / rel
              html = path.read_text(encoding='utf-8')
              tag = f'<script src="{src}" defer></script>'
              if tag not in html:
                  html = html.replace('</body>', tag + '\n</body>')
                  path.write_text(html, encoding='utf-8')

          i18n = base / 'assets/i18n.js'
          text = i18n.read_text(encoding='utf-8')
          old = "function chooseLanguage(lang){if(lang==='en'||SEO_LANGS.includes(lang)){let p=seoBasePath();if(!SEO_CORE.has(p))p='/';const target=lang==='en'?p:'/'+lang+(p==='/'?'/':p);location.href=target+location.search+location.hash;return}apply(lang)}"
          new = "function chooseLanguage(lang){const p=seoBasePath();if((lang==='en'||SEO_LANGS.includes(lang))&&SEO_CORE.has(p)){const target=lang==='en'?p:'/'+lang+(p==='/'?'/':p);location.href=target+location.search+location.hash;return}localStorage.setItem('sugargooLang',lang);apply(lang)}"
          if old not in text:
              raise SystemExit('Expected chooseLanguage implementation was not found')
          i18n.write_text(text.replace(old, new), encoding='utf-8')

      - name: Commit full article language support
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/fix-reverse-article-body-languages.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Translate full reverse-shopping articles across languages'
          git push origin HEAD:main
