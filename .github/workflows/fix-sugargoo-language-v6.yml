name: Fix Sugargoo language controller v6

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-sugargoo-language-v6.yml'

permissions:
  contents: write

jobs:
  repair-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build deterministic same-page language controller
        shell: python
        run: |
          from pathlib import Path

          base = Path('sugargoovip-preview')
          source = (base / 'assets/i18n-v5.js').read_text(encoding='utf-8')

          controller_start = source.index('function pageBasePath(){')
          apply_start = source.index('function apply(lang){', controller_start)

          controller = r'''function normalizePagePath(path){
            path=(path||'/').replace(/^\/(de|fr|es|pl)(?=\/|$)/,'')||'/';
            if(path==='/index.html')path='/';
            if(path==='/guides/index.html')path='/guides/';
            return path;
          }
          function pageBasePath(){return normalizePagePath(location.pathname)}
          function languagePathFor(lang,path){
            path=normalizePagePath(path);
            return SEO_LANGS.includes(lang)&&SEO_CORE.has(path)?'/'+lang+(path==='/'?'/':path):path;
          }
          function languageTarget(lang){
            if(!T[lang])lang='en';
            const url=new URL(location.href);
            url.pathname=languagePathFor(lang,url.pathname);
            url.searchParams.set('lang',lang);
            return url.pathname+url.search+url.hash;
          }
          function decorateInternalLinks(lang){
            document.querySelectorAll('a[href]').forEach(anchor=>{
              const raw=anchor.getAttribute('href');
              if(!raw||raw.startsWith('#')||raw.startsWith('mailto:')||raw.startsWith('tel:')||raw.startsWith('javascript:'))return;
              let url;
              try{url=new URL(raw,location.href)}catch{return}
              if(url.origin!==location.origin)return;
              url.pathname=languagePathFor(lang,url.pathname);
              url.searchParams.set('lang',lang);
              anchor.setAttribute('href',url.pathname+url.search+url.hash);
            });
          }
          function chooseLanguage(lang){
            if(!T[lang])lang='en';
            try{localStorage.setItem('sugargooLang',lang)}catch{}
            const target=languageTarget(lang);
            if(window.__SUGARGOO_TEST_NO_NAV__){
              history.replaceState({sugargooLanguage:lang},'',target);
              apply(lang);
              decorateInternalLinks(lang);
              window.dispatchEvent(new CustomEvent('sugargoo:languagechange',{detail:{lang}}));
              return;
            }
            const current=location.pathname+location.search+location.hash;
            if(current===target){
              apply(lang);
              decorateInternalLinks(lang);
              window.dispatchEvent(new CustomEvent('sugargoo:languagechange',{detail:{lang}}));
              return;
            }
            location.assign(target);
          }
          '''

          source = source[:controller_start] + controller + source[apply_start:]

          build_start = source.index('function build(){')
          iife_end = source.rindex('})();')
          build = r'''function build(){
            const queryLang=new URLSearchParams(location.search).get('lang');
            const pathLang=location.pathname.match(/^\/(de|fr|es|pl)(\/|$)/)?.[1];
            let stored='';
            try{stored=localStorage.getItem('sugargooLang')||''}catch{}
            const saved=(queryLang&&T[queryLang]?queryLang:null)||pathLang||(stored&&T[stored]?stored:null)||'en';
            try{localStorage.setItem('sugargooLang',saved)}catch{}
            document.querySelectorAll('.language-select').forEach(select=>{
              select.innerHTML='';
              Object.entries(labels).forEach(([value,name])=>{
                const option=document.createElement('option');
                option.value=value;
                option.textContent='🌐 '+name;
                select.appendChild(option);
              });
              if(select.dataset.sugargooLanguageV6!=='1'){
                select.dataset.sugargooLanguageV6='1';
                select.addEventListener('change',event=>{
                  event.stopImmediatePropagation();
                  chooseLanguage(select.value);
                },true);
              }
            });
            document.querySelectorAll('[data-language-button]').forEach(button=>{
              if(button.dataset.sugargooLanguageV6==='1')return;
              button.dataset.sugargooLanguageV6='1';
              button.addEventListener('click',event=>{
                event.preventDefault();
                event.stopImmediatePropagation();
                chooseLanguage(button.dataset.languageButton);
              },true);
            });
            apply(saved);
            decorateInternalLinks(saved);
            window.SugargooSetLanguage=chooseLanguage;
            window.SugargooLanguageTarget=languageTarget;
          }
          document.addEventListener('DOMContentLoaded',build);
          '''
          source = source[:build_start] + build + '\n})();'

          (base / 'assets/i18n-v6.js').write_text(source, encoding='utf-8')
          (base / 'assets/language-fix-v6.js').write_text((base / 'assets/language-fix-v5.js').read_text(encoding='utf-8'), encoding='utf-8')

          for page in base.rglob('*.html'):
            text = page.read_text(encoding='utf-8')
            text = text.replace('i18n-v5.js', 'i18n-v6.js')
            text = text.replace('language-fix-v5.js', 'language-fix-v6.js')
            page.write_text(text, encoding='utf-8')

          worker = base / '_worker.js'
          text = worker.read_text(encoding='utf-8')
          text = text.replace('/assets/i18n-v5.js', '/assets/i18n-v6.js')
          text = text.replace('/assets/language-fix-v5.js', '/assets/language-fix-v6.js')
          # Do not let a localized Worker response overwrite the browser's explicit query/localStorage choice.
          text = text.replace("<script>if(!localStorage.getItem('sugargooLang'))localStorage.setItem('sugargooLang','${lang}')</script><script src=\"/assets/i18n-v6.js\" defer></script>", "<script src=\"/assets/i18n-v6.js\" defer></script>")
          worker.write_text(text, encoding='utf-8')

          headers = base / '_headers'
          text = headers.read_text(encoding='utf-8')
          rules = '''\n/assets/i18n-v6.js\n  Cache-Control: no-store\n\n/assets/language-fix-v6.js\n  Cache-Control: no-store\n'''
          if '/assets/i18n-v6.js' not in text:
            text += rules
          headers.write_text(text, encoding='utf-8')

      - name: Run DOM regression tests
        run: |
          npm install --no-save jsdom@24
          cat > .tmp-language-v6.mjs <<'JS'
          import fs from 'node:fs';
          import {JSDOM} from 'jsdom';

          const base='sugargoovip-preview';
          const i18n=fs.readFileSync(`${base}/assets/i18n-v6.js`,'utf8');
          const fix=fs.readFileSync(`${base}/assets/language-fix-v6.js`,'utf8');
          const wait=dom=>new Promise(resolve=>dom.window.setTimeout(resolve,30));
          const assert=(condition,message)=>{if(!condition)throw new Error(message)};

          async function boot(file,url,stored,extra){
            const html=fs.readFileSync(`${base}/${file}`,'utf8');
            const dom=new JSDOM(html,{url,runScripts:'outside-only'});
            dom.window.__SUGARGOO_TEST_NO_NAV__=true;
            if(stored)dom.window.localStorage.setItem('sugargooLang',stored);
            dom.window.eval(i18n);
            dom.window.eval(fix);
            if(extra)dom.window.eval(fs.readFileSync(`${base}/${extra}`,'utf8'));
            dom.window.document.dispatchEvent(new dom.window.Event('DOMContentLoaded',{bubbles:true}));
            await wait(dom);
            return dom;
          }
          async function select(dom,lang){
            const element=dom.window.document.querySelector('.language-select');
            element.value=lang;
            element.dispatchEvent(new dom.window.Event('change',{bubbles:true}));
            await wait(dom);
          }

          const home=await boot('index.html','https://sugargoovip.uk/?lang=it','en');
          assert(home.window.document.querySelector('.language-select').value==='it','URL language did not override old storage');
          assert(home.window.document.querySelector('[data-i18n="hero.b"]').textContent.includes('Guida'),'Italian home did not render');
          await select(home,'en');
          assert(home.window.document.querySelector('.language-select').value==='en','Home selector reverted to Italian');
          assert(home.window.document.querySelector('[data-i18n="hero.b"]').textContent==='Shopping Guide','English home did not render');
          assert(home.window.location.pathname==='/' ,'Home changed to another page');
          assert(home.window.location.search.includes('lang=en'),'English query state missing');

          await select(home,'de');
          assert(home.window.document.querySelector('.language-select').value==='de','German did not render');
          assert(home.window.location.pathname==='/de/','German SEO path was not generated');
          await select(home,'pt');
          assert(home.window.location.pathname==='/' ,'Portuguese did not preserve home page');
          assert(home.window.location.search.includes('lang=pt'),'Portuguese query state missing');

          const articleFile='guides/sugargoo-reverse-shopping-multi-item-order-ledger.html';
          const article=await boot(articleFile,`https://sugargoovip.uk/${articleFile}?lang=it`,'zh','assets/reverse-articles/multi-item-order-ledger.js');
          assert(article.window.document.querySelector('.article-card h1').textContent.startsWith('Come organizzare'),'Italian article did not render');
          await select(article,'en');
          assert(article.window.location.pathname===`/${articleFile}`,'Article jumped away from its page');
          assert(article.window.document.querySelector('.article-card h1').textContent.startsWith('How to Organize'),'English article did not render');
          await select(article,'zh');
          assert(article.window.location.pathname===`/${articleFile}`,'Chinese article jumped away from its page');
          assert(article.window.document.querySelector('.article-card h1').textContent.includes('反向代购'),'Chinese article did not restore');

          const seo=await boot('guides/qc-guide.html','https://sugargoovip.uk/de/guides/qc-guide.html',null);
          assert(seo.window.document.querySelector('.language-select').value==='de','Direct German path did not render German');
          assert(seo.window.SugargooLanguageTarget('it').startsWith('/guides/qc-guide.html?lang=it'),'German article would not preserve the article when switching to Italian');
          assert(seo.window.SugargooLanguageTarget('fr').startsWith('/fr/guides/qc-guide.html?lang=fr'),'French core article target is incorrect');

          const articleLink=home.window.document.querySelector('a[href*="guides/what-is-sugargoo"]');
          assert(articleLink.href.includes('lang=pt'),'Internal page links do not preserve selected language');
          console.log('PASS: v6 language switching is deterministic and preserves the current page.');
          JS
          node .tmp-language-v6.mjs

      - name: Validate versioned assets and commit
        run: |
          set -euo pipefail
          grep -R --include='*.html' -q 'i18n-v6.js' sugargoovip-preview
          ! grep -R --include='*.html' -n 'i18n-v5.js\|language-fix-v5.js' sugargoovip-preview
          grep -q '/assets/i18n-v6.js' sugargoovip-preview/_worker.js
          rm -rf .github/workflows/fix-sugargoo-language-v6.yml .tmp-language-v6.mjs node_modules package.json package-lock.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Replace Sugargoo language switching with deterministic v6 controller'
          git push origin HEAD:main
