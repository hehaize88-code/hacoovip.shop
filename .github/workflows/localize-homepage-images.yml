name: Localize homepage product images

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/localize-homepage-images.yml'

permissions:
  contents: write

jobs:
  localize-images:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download homepage product images
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p sugargoovip-preview/assets/products
          curl -fL --retry 4 --retry-delay 2 -A 'Mozilla/5.0' \
            'https://www.cnfanshp.com/uploads/allimg/20260417/1-26041G55S9251.jpg' \
            -o sugargoovip-preview/assets/products/shoes.jpg
          curl -fL --retry 4 --retry-delay 2 -A 'Mozilla/5.0' \
            'https://www.cnfanshp.com/uploads/allimg/20260417/1-26041G1101D39.webp' \
            -o sugargoovip-preview/assets/products/sweatshirt.webp
          curl -fL --retry 4 --retry-delay 2 -A 'Mozilla/5.0' \
            'https://www.cnfanshp.com/uploads/allimg/20260417/1-26041G1121Q55.webp' \
            -o sugargoovip-preview/assets/products/polo.webp
          curl -fL --retry 4 --retry-delay 2 -A 'Mozilla/5.0' \
            'https://www.cnfanshp.com/uploads/allimg/20260417/1-26041G1193O56.webp' \
            -o sugargoovip-preview/assets/products/jacket.webp
          test -s sugargoovip-preview/assets/products/shoes.jpg
          test -s sugargoovip-preview/assets/products/sweatshirt.webp
          test -s sugargoovip-preview/assets/products/polo.webp
          test -s sugargoovip-preview/assets/products/jacket.webp

      - name: Replace external image URLs with local assets
        shell: python
        run: |
          from pathlib import Path

          path = Path('sugargoovip-preview/index.html')
          html = path.read_text(encoding='utf-8')
          replacements = {
              'https://www.cnfanshp.com/uploads/allimg/20260417/1-26041G55S9251.jpg': 'assets/products/shoes.jpg',
              'https://www.cnfanshp.com/uploads/allimg/20260417/1-26041G1101D39.webp': 'assets/products/sweatshirt.webp',
              'https://www.cnfanshp.com/uploads/allimg/20260417/1-26041G1121Q55.webp': 'assets/products/polo.webp',
              'https://www.cnfanshp.com/uploads/allimg/20260417/1-26041G1193O56.webp': 'assets/products/jacket.webp',
          }
          for old, new in replacements.items():
              html = html.replace(old, new)
          path.write_text(html, encoding='utf-8')

      - name: Commit localized assets
        shell: bash
        run: |
          set -euo pipefail
          rm -f sugargoovip-preview/assets/products/README.txt
          rm -f .github/workflows/localize-homepage-images.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Store homepage product images in local assets'
          git push origin HEAD:main
