<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Shipping restriction check</title><desc id="desc">Country and category planning followed by warehouse classification and a live route check.</desc><rect width="1600" height="900" fill="#10110f"/>
  <text x="100" y="120" fill="#c8ff2e" font-family="Arial,sans-serif" font-size="32" font-weight="700" letter-spacing="5">RESTRICTION CHECK</text><text x="100" y="225" fill="#fff" font-family="Arial,sans-serif" font-size="76" font-weight="800">Screen early. Verify again.</text>
  <g font-family="Arial,sans-serif"><rect x="100" y="350" width="320" height="300" rx="12" fill="#f4efe3"/><text x="135" y="420" fill="#10110f" font-size="24" font-weight="700">01 · COUNTRY</text><text x="135" y="515" fill="#10110f" font-size="36" font-weight="700">Destination</text>
  <rect x="460" y="350" width="320" height="300" rx="12" fill="#f4efe3"/><text x="495" y="420" fill="#10110f" font-size="24" font-weight="700">02 · CATEGORY</text><text x="495" y="515" fill="#10110f" font-size="29" font-weight="700">Truthful content</text>
  <rect x="820" y="350" width="320" height="300" rx="12" fill="#c8ff2e"/><text x="855" y="420" fill="#10110f" font-size="24" font-weight="700">03 · WAREHOUSE</text><text x="855" y="515" fill="#10110f" font-size="36" font-weight="700">Final class</text>
  <rect x="1180" y="350" width="320" height="300" rx="12" fill="#f4efe3"/><text x="1215" y="420" fill="#10110f" font-size="24" font-weight="700">04 · LIVE ROUTE</text><text x="1215" y="515" fill="#10110f" font-size="36" font-weight="700">Eligible now?</text></g>
  <text x="100" y="790" fill="#b8baaf" font-family="Arial,sans-serif" font-size="25">Customs, airline and provider rules can change. Date every result.</text>
</svg>
