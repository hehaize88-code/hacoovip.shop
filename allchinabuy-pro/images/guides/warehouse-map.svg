<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Warehouse consolidation map</title><desc id="desc">Separate South China and Hong Kong inventory before creating parcels.</desc><rect width="1600" height="900" fill="#f4efe3"/>
  <text x="100" y="120" fill="#10110f" font-family="Arial,sans-serif" font-size="32" font-weight="700" letter-spacing="5">WAREHOUSE LEDGER</text><text x="100" y="210" fill="#10110f" font-family="Arial,sans-serif" font-size="61" font-weight="800">Same account does not mean same parcel.</text>
  <g font-family="Arial,sans-serif"><rect x="100" y="340" width="650" height="330" rx="12" fill="#10110f"/><text x="145" y="420" fill="#c8ff2e" font-size="27" font-weight="700">SOUTH CHINA</text><text x="145" y="510" fill="#fff" font-size="42" font-weight="700">Group eligible arrivals</text><text x="145" y="570" fill="#c9c8bf" font-size="24">Arrival · timer · inspection · packing</text>
  <rect x="850" y="340" width="650" height="330" rx="12" fill="#10110f"/><text x="895" y="420" fill="#c8ff2e" font-size="27" font-weight="700">HONG KONG</text><text x="895" y="510" fill="#fff" font-size="42" font-weight="700">Keep as a separate pool</text><text x="895" y="570" fill="#c9c8bf" font-size="24">Check origin and live intake rule</text></g>
  <rect x="730" y="335" width="140" height="340" fill="#c8ff2e"/><text x="800" y="495" text-anchor="middle" fill="#10110f" font-family="Arial,sans-serif" font-size="70" font-weight="800">≠</text><text x="800" y="545" text-anchor="middle" fill="#10110f" font-family="Arial,sans-serif" font-size="14" font-weight="700">NO CROSS</text><text x="800" y="567" text-anchor="middle" fill="#10110f" font-family="Arial,sans-serif" font-size="14" font-weight="700">MIXING</text>
  <text x="100" y="790" fill="#4b4d45" font-family="Arial,sans-serif" font-size="25">Plan from the live warehouse assignment and earliest displayed deadline.</text>
</svg>
