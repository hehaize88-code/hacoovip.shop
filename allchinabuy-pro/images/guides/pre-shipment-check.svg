<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Pre shipment checks</title><desc id="desc">Fifteen checks grouped into item, parcel, route and record gates.</desc><rect width="1600" height="900" fill="#f4efe3"/>
  <text x="100" y="120" fill="#10110f" font-family="Arial,sans-serif" font-size="32" font-weight="700" letter-spacing="5">PRE-SHIPMENT GATE</text><text x="100" y="225" fill="#10110f" font-family="Arial,sans-serif" font-size="76" font-weight="800">15 checks before freight payment.</text>
  <g font-family="Arial,sans-serif"><rect x="100" y="350" width="320" height="300" rx="12" fill="#10110f"/><text x="135" y="420" fill="#c8ff2e" font-size="24" font-weight="700">ITEM · 1–4</text><text x="135" y="510" fill="#fff" font-size="29" font-weight="700">Match + photos</text>
  <rect x="460" y="350" width="320" height="300" rx="12" fill="#10110f"/><text x="495" y="420" fill="#c8ff2e" font-size="24" font-weight="700">PARCEL · 5–11</text><text x="495" y="510" fill="#fff" font-size="29" font-weight="700">Pack + measure</text>
  <rect x="820" y="350" width="320" height="300" rx="12" fill="#c8ff2e"/><text x="855" y="420" fill="#10110f" font-size="24" font-weight="700">ROUTE · 12–14</text><text x="855" y="510" fill="#10110f" font-size="28" font-weight="700">Eligible + full fee</text>
  <rect x="1180" y="350" width="320" height="300" rx="12" fill="#10110f"/><text x="1215" y="420" fill="#c8ff2e" font-size="24" font-weight="700">RECORD · 15</text><text x="1215" y="510" fill="#fff" font-size="34" font-weight="700">Save the facts</text></g>
  <text x="100" y="790" fill="#4b4d45" font-family="Arial,sans-serif" font-size="25">A failed check creates an action. It is never an ignored warning.</text>
</svg>
