<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Used item risk gates</title><desc id="desc">Seller evidence, visible condition, return terms and worst-case cost.</desc><rect width="1600" height="900" fill="#f4efe3"/>
  <text x="100" y="120" fill="#10110f" font-family="Arial,sans-serif" font-size="32" font-weight="700" letter-spacing="5">USED-ITEM GATES</text><text x="100" y="225" fill="#10110f" font-family="Arial,sans-serif" font-size="76" font-weight="800">Price the uncertainty.</text>
  <g font-family="Arial,sans-serif"><rect x="100" y="350" width="320" height="300" rx="12" fill="#10110f"/><text x="135" y="420" fill="#c8ff2e" font-size="24" font-weight="700">SELLER</text><text x="135" y="515" fill="#fff" font-size="34" font-weight="700">Evidence saved?</text>
  <rect x="460" y="350" width="320" height="300" rx="12" fill="#10110f"/><text x="495" y="420" fill="#c8ff2e" font-size="24" font-weight="700">CONDITION</text><text x="495" y="515" fill="#fff" font-size="34" font-weight="700">Visible only</text>
  <rect x="820" y="350" width="320" height="300" rx="12" fill="#c8ff2e"/><text x="855" y="420" fill="#10110f" font-size="24" font-weight="700">TERMS</text><text x="855" y="515" fill="#10110f" font-size="34" font-weight="700">Return possible?</text>
  <rect x="1180" y="350" width="320" height="300" rx="12" fill="#10110f"/><text x="1215" y="420" fill="#c8ff2e" font-size="24" font-weight="700">LOSS LIMIT</text><text x="1215" y="515" fill="#fff" font-size="28" font-weight="700">Can you accept it?</text></g>
  <text x="100" y="790" fill="#4b4d45" font-family="Arial,sans-serif" font-size="25">Limited inspection cannot create provenance, completeness or long-term performance evidence.</text>
</svg>
