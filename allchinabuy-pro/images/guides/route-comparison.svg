<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Shipping route comparison</title><desc id="desc">A route matrix comparing eligibility, complete cost, estimate and evidence.</desc><rect width="1600" height="900" fill="#10110f"/>
  <text x="100" y="120" fill="#c8ff2e" font-family="Arial,sans-serif" font-size="32" font-weight="700" letter-spacing="5">ROUTE COMPARISON</text><text x="100" y="225" fill="#fff" font-family="Arial,sans-serif" font-size="76" font-weight="800">Rank only eligible lines.</text>
  <g font-family="Arial,sans-serif" font-size="26"><rect x="100" y="330" width="1400" height="380" rx="12" fill="#f4efe3"/><rect x="100" y="330" width="1400" height="90" rx="12" fill="#c8ff2e"/><text x="150" y="388" fill="#10110f" font-weight="700">ROUTE</text><text x="475" y="388" fill="#10110f" font-weight="700">ELIGIBLE</text><text x="760" y="388" fill="#10110f" font-weight="700">FULL COST</text><text x="1060" y="388" fill="#10110f" font-weight="700">TIME RANGE</text><text x="1325" y="388" fill="#10110f" font-weight="700">TERMS</text>
  <text x="150" y="500" fill="#10110f">A</text><text x="475" y="500" fill="#10110f">Yes</text><text x="760" y="500" fill="#10110f">Same inputs</text><text x="1060" y="500" fill="#10110f">Estimate</text><text x="1325" y="500" fill="#10110f">Read</text><line x1="130" y1="545" x2="1470" y2="545" stroke="#b9b5a9"/>
  <text x="150" y="630" fill="#10110f">B</text><text x="475" y="630" fill="#10110f">No</text><text x="760" y="630" fill="#10110f">Not an option</text><text x="1060" y="630" fill="#10110f">—</text><text x="1325" y="630" fill="#10110f">Stop</text></g>
  <text x="100" y="805" fill="#b8baaf" font-family="Arial,sans-serif" font-size="25">Headline price alone cannot describe a route decision.</text>
</svg>
