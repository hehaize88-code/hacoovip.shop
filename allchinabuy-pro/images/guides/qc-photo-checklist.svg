<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">QC photo checklist</title><desc id="desc">Four review questions for warehouse photographs.</desc><rect width="1600" height="900" fill="#10110f"/>
  <text x="100" y="120" fill="#c8ff2e" font-family="Arial,sans-serif" font-size="32" font-weight="700" letter-spacing="5">QC PHOTO REVIEW</text><text x="100" y="230" fill="#fff" font-family="Arial,sans-serif" font-size="78" font-weight="800">Check the order before the flaw.</text>
  <g font-family="Arial,sans-serif"><rect x="100" y="350" width="325" height="300" rx="12" fill="#f4efe3"/><text x="135" y="415" fill="#10110f" font-size="25" font-weight="700">01 · IDENTITY</text><text x="135" y="505" fill="#10110f" font-size="36" font-weight="700">Right item?</text><text x="135" y="560" fill="#55584d" font-size="24">Type and quantity</text>
  <rect x="458" y="350" width="325" height="300" rx="12" fill="#f4efe3"/><text x="493" y="415" fill="#10110f" font-size="25" font-weight="700">02 · OPTION</text><text x="493" y="505" fill="#10110f" font-size="36" font-weight="700">Right colour?</text><text x="493" y="560" fill="#55584d" font-size="24">Size and visible label</text>
  <rect x="816" y="350" width="325" height="300" rx="12" fill="#c8ff2e"/><text x="851" y="415" fill="#10110f" font-size="25" font-weight="700">03 · EVIDENCE</text><text x="851" y="505" fill="#10110f" font-size="36" font-weight="700">Right measure?</text><text x="851" y="560" fill="#31342b" font-size="24">One precise request</text>
  <rect x="1174" y="350" width="325" height="300" rx="12" fill="#f4efe3"/><text x="1209" y="415" fill="#10110f" font-size="25" font-weight="700">04 · LIMIT</text><text x="1209" y="505" fill="#10110f" font-size="36" font-weight="700">Only visible.</text><text x="1209" y="560" fill="#55584d" font-size="24">Not provenance or durability</text></g>
  <text x="100" y="790" fill="#b8baaf" font-family="Arial,sans-serif" font-size="25">Standard inspection can reduce visible uncertainty. It cannot prove every product claim.</text>
</svg>
