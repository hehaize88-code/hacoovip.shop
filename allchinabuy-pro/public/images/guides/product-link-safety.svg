<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Product link verification</title><desc id="desc">Source URL, live option, current eligibility and saved evidence.</desc><rect width="1600" height="900" fill="#10110f"/>
  <text x="100" y="120" fill="#c8ff2e" font-family="Arial,sans-serif" font-size="32" font-weight="700" letter-spacing="5">PRODUCT LINK SAFETY</text><text x="100" y="225" fill="#fff" font-family="Arial,sans-serif" font-size="76" font-weight="800">A link is a route—not proof.</text>
  <g font-family="Arial,sans-serif"><rect x="100" y="350" width="420" height="280" rx="12" fill="#f4efe3"/><text x="140" y="420" fill="#10110f" font-size="25" font-weight="700">SOURCE RECORD</text><text x="140" y="505" fill="#10110f" font-size="36" font-weight="700">URL · seller · date</text><text x="140" y="560" fill="#55584d" font-size="24">Preserve original context</text>
  <rect x="590" y="350" width="420" height="280" rx="12" fill="#c8ff2e"/><text x="630" y="420" fill="#10110f" font-size="25" font-weight="700">LIVE PRODUCT</text><text x="630" y="505" fill="#10110f" font-size="30" font-weight="700">Option · price · stock</text><text x="630" y="560" fill="#31342b" font-size="24">Check again before payment</text>
  <rect x="1080" y="350" width="420" height="280" rx="12" fill="#f4efe3"/><text x="1120" y="420" fill="#10110f" font-size="25" font-weight="700">ELIGIBILITY</text><text x="1120" y="505" fill="#10110f" font-size="36" font-weight="700">Country · category</text><text x="1120" y="560" fill="#55584d" font-size="24">Warehouse decision later</text></g>
  <text x="100" y="770" fill="#b8baaf" font-family="Arial,sans-serif" font-size="25">Stop on an unexpected domain, changed product or unexplained price difference.</text>
</svg>
