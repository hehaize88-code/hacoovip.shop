<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Original packing choice</title><desc id="desc">Trade-off between keeping protection and removing excess shipping volume.</desc><rect width="1600" height="900" fill="#f4efe3"/>
  <text x="100" y="120" fill="#10110f" font-family="Arial,sans-serif" font-size="32" font-weight="700" letter-spacing="5">ORIGINAL PACKING</text><text x="100" y="225" fill="#10110f" font-family="Arial,sans-serif" font-size="64" font-weight="800">Keep function. Remove empty volume.</text>
  <g font-family="Arial,sans-serif"><rect x="100" y="345" width="650" height="340" rx="12" fill="#10110f"/><text x="145" y="420" fill="#c8ff2e" font-size="26" font-weight="700">KEEP THE COURIER BOX</text><text x="145" y="510" fill="#fff" font-size="42" font-weight="700">Protection or evidence</text><text x="145" y="575" fill="#c9c8bf" font-size="25">But larger weight and dimensions</text>
  <rect x="850" y="345" width="650" height="340" rx="12" fill="#c8ff2e"/><text x="895" y="420" fill="#10110f" font-size="26" font-weight="700">REMOVE THE COURIER BOX</text><text x="895" y="510" fill="#10110f" font-size="42" font-weight="700">Lower empty volume</text><text x="895" y="575" fill="#31342b" font-size="25">Confirm replacement protection</text></g>
  <text x="100" y="790" fill="#4b4d45" font-family="Arial,sans-serif" font-size="25">Name the exact layer to keep: courier carton, retail box, insert or factory seal.</text>
</svg>
