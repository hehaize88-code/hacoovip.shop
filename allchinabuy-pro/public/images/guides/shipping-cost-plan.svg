<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Shipping cost planning model</title><desc id="desc">Product cost, packed inputs, route comparison and budget buffer.</desc><rect width="1600" height="900" fill="#f4efe3"/>
  <text x="100" y="120" fill="#10110f" font-family="Arial,sans-serif" font-size="32" font-weight="700" letter-spacing="5">SHIPPING COST PLAN</text><text x="100" y="225" fill="#10110f" font-family="Arial,sans-serif" font-size="76" font-weight="800">Budget the unknowns on purpose.</text>
  <g font-family="Arial,sans-serif"><rect x="100" y="345" width="320" height="290" rx="12" fill="#10110f"/><text x="135" y="415" fill="#c8ff2e" font-size="25" font-weight="700">1 · LEDGER</text><text x="135" y="500" fill="#fff" font-size="34" font-weight="700">Item + local</text><text x="135" y="550" fill="#c9c8bf" font-size="23">Keep costs separate</text>
  <rect x="460" y="345" width="320" height="290" rx="12" fill="#10110f"/><text x="495" y="415" fill="#c8ff2e" font-size="25" font-weight="700">2 · PACKED DATA</text><text x="495" y="500" fill="#fff" font-size="34" font-weight="700">Weight + L/W/H</text><text x="495" y="550" fill="#c9c8bf" font-size="23">Use realistic cases</text>
  <rect x="820" y="345" width="320" height="290" rx="12" fill="#c8ff2e"/><text x="855" y="415" fill="#10110f" font-size="25" font-weight="700">3 · LIVE ROUTES</text><text x="855" y="500" fill="#10110f" font-size="28" font-weight="700">Eligible + full fee</text><text x="855" y="550" fill="#31342b" font-size="23">Same inputs for each</text>
  <rect x="1180" y="345" width="320" height="290" rx="12" fill="#10110f"/><text x="1215" y="415" fill="#c8ff2e" font-size="25" font-weight="700">4 · BUFFER</text><text x="1215" y="500" fill="#fff" font-size="34" font-weight="700">High-case test</text><text x="1215" y="550" fill="#c9c8bf" font-size="23">Rates and packing move</text></g>
  <text x="100" y="770" fill="#4b4d45" font-family="Arial,sans-serif" font-size="25">A quote without destination, category, warehouse, dimensions, weight and date is not comparable.</text>
</svg>
