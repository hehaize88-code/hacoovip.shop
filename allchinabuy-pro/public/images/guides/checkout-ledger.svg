<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Checkout cost ledger</title><desc id="desc">Four cost stages from product and local shipping to warehouse service, international freight and destination charges.</desc><rect width="1600" height="900" fill="#10110f"/>
  <text x="100" y="120" fill="#c8ff2e" font-family="Arial,sans-serif" font-size="32" font-weight="700" letter-spacing="5">COST LEDGER</text><text x="100" y="225" fill="#fff" font-family="Arial,sans-serif" font-size="76" font-weight="800">Four stages. No fake “all-in” total.</text>
  <g font-family="Arial,sans-serif"><rect x="100" y="350" width="320" height="300" rx="12" fill="#f4efe3"/><text x="135" y="420" fill="#10110f" font-size="23" font-weight="700">01 · PRODUCT</text><text x="135" y="510" fill="#10110f" font-size="34" font-weight="700">Item + local</text>
  <rect x="460" y="350" width="320" height="300" rx="12" fill="#f4efe3"/><text x="495" y="420" fill="#10110f" font-size="23" font-weight="700">02 · WAREHOUSE</text><text x="495" y="510" fill="#10110f" font-size="29" font-weight="700">Optional service</text>
  <rect x="820" y="350" width="320" height="300" rx="12" fill="#c8ff2e"/><text x="855" y="420" fill="#10110f" font-size="23" font-weight="700">03 · FREIGHT</text><text x="855" y="510" fill="#10110f" font-size="34" font-weight="700">After packing</text>
  <rect x="1180" y="350" width="320" height="300" rx="12" fill="#f4efe3"/><text x="1215" y="420" fill="#10110f" font-size="23" font-weight="700">04 · DESTINATION</text><text x="1215" y="510" fill="#10110f" font-size="34" font-weight="700">Official rules</text></g>
  <text x="100" y="790" fill="#b8baaf" font-family="Arial,sans-serif" font-size="25">International delivery is calculated later; keep it as an explicit unknown until measured.</text>
</svg>
