<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AllChinaBuy public workflow</title><desc id="desc">Product, domestic delivery, warehouse inspection and international parcel stages.</desc>
  <rect width="1600" height="900" fill="#f4efe3"/><text x="100" y="120" fill="#10110f" font-family="Arial,sans-serif" font-size="34" font-weight="700" letter-spacing="5">PUBLIC WORKFLOW · CHECKED 17 JUL 2026</text>
  <text x="100" y="220" fill="#10110f" font-family="Arial,sans-serif" font-size="76" font-weight="800">One order. Four evidence gates.</text>
  <g font-family="Arial,sans-serif"><rect x="100" y="330" width="320" height="330" rx="12" fill="#10110f"/><text x="135" y="395" fill="#c8ff2e" font-size="24" font-weight="700">01 · PRODUCT</text><text x="135" y="480" fill="#fff" font-size="38" font-weight="700">URL + option</text><text x="135" y="535" fill="#c9c8bf" font-size="25">Price and local delivery</text><text x="135" y="580" fill="#c9c8bf" font-size="25">saved before payment</text>
  <rect x="460" y="330" width="320" height="330" rx="12" fill="#10110f"/><text x="495" y="395" fill="#c8ff2e" font-size="24" font-weight="700">02 · DOMESTIC</text><text x="495" y="475" fill="#fff" font-size="34" font-weight="700">Seller →</text><text x="495" y="520" fill="#fff" font-size="34" font-weight="700">warehouse</text><text x="495" y="570" fill="#c9c8bf" font-size="23">Track dispatch and</text><text x="495" y="610" fill="#c9c8bf" font-size="23">receiving warehouse</text>
  <rect x="820" y="330" width="320" height="330" rx="12" fill="#c8ff2e"/><text x="855" y="395" fill="#10110f" font-size="24" font-weight="700">03 · WAREHOUSE</text><text x="855" y="480" fill="#10110f" font-size="38" font-weight="700">Inspect + pack</text><text x="855" y="535" fill="#31342b" font-size="25">Photos, classification,</text><text x="855" y="580" fill="#31342b" font-size="25">weight and dimensions</text>
  <rect x="1180" y="330" width="320" height="330" rx="12" fill="#10110f"/><text x="1215" y="395" fill="#c8ff2e" font-size="21" font-weight="700">04 · INTERNATIONAL</text><text x="1215" y="475" fill="#fff" font-size="34" font-weight="700">Choose live</text><text x="1215" y="520" fill="#fff" font-size="34" font-weight="700">route</text><text x="1215" y="570" fill="#c9c8bf" font-size="23">Eligibility, full quote,</text><text x="1215" y="610" fill="#c9c8bf" font-size="23">terms and timestamp</text></g>
  <text x="100" y="790" fill="#4b4d45" font-family="Arial,sans-serif" font-size="25">International delivery is a later stage—do not read the product checkout as a delivered total.</text>
</svg>
